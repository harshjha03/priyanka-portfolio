  <style>

      font-weight: 400;
      font-display: swap;

    * {

      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

      background-color: #1a2e1a;

      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--dark);
      overflow: hidden;
      height: 100vh;
    }

    /* NAVBAR */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 64px;
      background: rgba(18, 14, 8, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      z-index: 200;
    }

    .nav-left a {
      font-size: 15px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--cream);
      text-decoration: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .nav-right a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--cream);
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s;
    }

    .nav-right a:hover { opacity: 1; }

    .nav-right a.active {
      border-bottom: 2px solid var(--gold);
      padding-bottom: 4px;
      opacity: 1;
    }

    .cta-pill {
      background: var(--gold) !important;
      color: var(--dark) !important;
      padding: 10px 24px;
      border-radius: 100px;
      opacity: 1 !important;
    }

    /* FILTER TABS */
    .filter-tabs {
      position: fixed;
      top: 64px;
      left: 0;
      width: 100%;
      height: 32px;
      background: rgba(28, 22, 17, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      padding: 0 48px;
      gap: 32px;
      z-index: 190;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .tab {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(250, 247, 240, 0.5);
      cursor: pointer;
      transition: color 0.2s;
      height: 100%;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
    }

    .tab:hover { color: var(--cream); }

    .tab.active {
      color: var(--cream);
      border-bottom: 2px solid var(--gold);
    }

    /* LAYOUT */
    .layout {
      position: fixed;
      top: 96px;
      left: 0;
      width: 100%;
      height: calc(100vh - 96px);
      display: grid;
      grid-template-columns: 15% 35% 50%;
    }

    /* LEFT COLUMN */
    .left-col {
      background: var(--glass-dark);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border-right: 1px solid rgba(212, 168, 67, 0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .cluster-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(250, 247, 240, 0.5);
      margin-bottom: 24px;
      transition: opacity 0.3s ease;
    }

    .counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--gold);
      transition: opacity 0.3s ease;
    }

    /* CENTRE COLUMN */
    .centre-col {
      background: var(--glass-reel);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border-right: 1px solid rgba(250, 247, 240, 0.06);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }

    .centre-col::-webkit-scrollbar { display: none; }

    .project-frame {
      height: calc(100vh - 96px);
      width: 100%;
      scroll-snap-align: start;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .project-frame:hover { transform: scale(1.015); }

    .project-frame.active {
      box-shadow: inset 0 0 0 2px var(--gold);
    }

    .frame-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .frame-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(28,22,17,0.7) 0%, transparent 50%);
      pointer-events: none;
    }

    .frame-info {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(250, 247, 240, 0.6);
    }

    /* RIGHT COLUMN */
    .right-col {
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(28, 22, 17, 0.12);
      overflow-y: auto;
      padding: 48px 52px;
      position: relative;
    }

    .content-wrapper {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .content-wrapper.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .label-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--gold);
      display: block;
    }

    h1 {
      font-family: 'GeistPixelSquare', sans-serif;
      font-size: 36px;
      color: var(--dark);
      margin-top: 12px;
      line-height: 1.1;
    }

    .gold-rule {
      width: 40px;
      height: 2px;
      background: var(--gold);
      margin: 20px 0;
    }

    .hook {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--dark);
      font-style: italic;
    }

    .divider {
      height: 1px;
      background: rgba(28, 22, 17, 0.1);
      margin: 24px 0;
    }

    .body-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      line-height: 1.9;
      color: rgba(28, 22, 17, 0.7);
      max-width: 520px;
    }

    .body-text p { margin-bottom: 20px; }

    .cta-area {
      position: sticky;
      bottom: 0;
      background: transparent;
      backdrop-filter: none;
      padding: 20px 0 0;
      border-top: 1px solid rgba(28, 22, 17, 0.08);
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 40px;
    }

    .primary-cta {
      background: var(--gold);
      color: var(--dark);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .primary-cta:hover { transform: translateY(-1px); }

    .secondary-cta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(28, 22, 17, 0.4);
      text-decoration: none;
      transition: color 0.2s;
    }

    .secondary-cta:hover { color: var(--dark); }

    /* CLUSTER COLORS */
    .bg-experience { background-color: #1A3020; }
    .bg-research { background-color: #142824; }
    .bg-brand { background-color: #1E2A18; }

  </style>

    const reel = document.getElementById('reel');
    const contentInner = document.getElementById('content-inner');
    const leftCluster = document.getElementById('left-cluster');
    const leftCounter = document.getElementById('left-counter');
    const tabs = document.querySelectorAll('.tab');

    // INITIAL RENDER
    function renderReel() {
      reel.innerHTML = PROJECTS.map((p, i) => `
        <div class="project-frame ${p.image ? '' : 'bg-' + p.cluster}" data-id="${p.id}" data-slug="${p.slug}" data-cluster="${p.cluster}">
          ${p.image ? `<img src="${p.image}" class="frame-bg" referrerPolicy="no-referrer">` : ''}
          <div class="frame-overlay"></div>
          <div class="frame-info">${String(i + 1).padStart(2, '0')} · ${p.year}</div>
        </div>
      `).join('');
    }

    function updateRightColumn(project) {
      contentInner.classList.remove('visible');
      
      setTimeout(() => {
        const paragraphs = project.paragraphs.map(p => `<p>${p}</p>`).join('');
        
        contentInner.innerHTML = `
          <span class="label-tag">${project.type}</span>
          <h1>${project.name}</h1>
          <div class="gold-rule"></div>
          <div class="hook">${project.hook}</div>
          <div class="divider"></div>
          <div class="body-text">
            ${paragraphs}
          </div>
          <div class="cta-area">
            <a href="${project.deepLink}" class="primary-cta" target="_blank" rel="noopener noreferrer">View Full Case Study &rarr;</a>
            <a href="work.html" class="secondary-cta">&larr; All Projects</a>
          </div>
        `;
        
        contentInner.classList.add('visible');
      }, 150);
    }

    // INTERSECTION OBSERVER
    const observerOptions = {
      root: reel,
      threshold: 0.6
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = parseInt(entry.target.getAttribute('data-id'));
          const project = PROJECTS.find(p => p.id === id);
          
          // 1. Active class
          document.querySelectorAll('.project-frame').forEach(f => f.classList.remove('active'));
          entry.target.classList.add('active');
          
          // 2. Left Column
          leftCluster.textContent = project.cluster === 'experience' ? 'Experience Design' : 
                                    project.cluster === 'research' ? 'Research & Foresight' : 
                                    'Brand & Visual Culture';
          leftCounter.textContent = `${String(id).padStart(2, '0')} / ${String(PROJECTS.length).padStart(2, '0')}`;
          
          // 3. Right Column
          updateRightColumn(project);
          
          // 4. Silent Hash
          history.replaceState(null, '', '#' + project.slug);

          // 5. Update Tab Active State
          tabs.forEach(t => {
            t.classList.toggle('active', t.getAttribute('data-filter') === project.cluster);
          });
        }
      });
    }, observerOptions);

    // TABS LOGIC
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const filter = tab.getAttribute('data-filter');
        
        if (filter === 'all') {
          reel.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          const firstInCluster = PROJECTS.find(p => p.cluster === filter);
          if (firstInCluster) {
            const frame = document.querySelector(`[data-id="${firstInCluster.id}"]`);
            frame.scrollIntoView({ behavior: 'smooth' });
          }
        }
      });
    });

    // INIT
    renderReel();
    document.querySelectorAll('.project-frame').forEach(f => observer.observe(f));

    // HASH LOAD
    window.addEventListener('load', () => {
      const hash = window.location.hash.replace('#', '');
      if (hash) {
        // Check if it's a slug
        const project = PROJECTS.find(p => p.slug === hash);
        if (project) {
          const frame = document.querySelector(`[data-id="${project.id}"]`);
          frame.scrollIntoView({ behavior: 'instant' });
        } else {
          // Check if it's a cluster
          const clusterMap = {
            'experience': 'experience',
            'research': 'research',
            'brand': 'brand'
          };
          if (clusterMap[hash]) {
            const firstInCluster = PROJECTS.find(p => p.cluster === clusterMap[hash]);
            const frame = document.querySelector(`[data-id="${firstInCluster.id}"]`);
            frame.scrollIntoView({ behavior: 'instant' });
          }
        }
      }
    });

  </script>
