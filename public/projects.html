        }

            background: var(--bg-dark);
            z-index: 0;
        }

            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: var(--nav-bg);

            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            z-index: 200;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

            font-size: 15px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-decoration: none;
            color: var(--warm-white);

            align-items: center;

            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;

            opacity: 1;
        }

            background: var(--warm-white);
        }

            top: 64px;
            left: 0;
            width: 100%;
            background: var(--filter-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);

            display: flex;
            gap: 32px;
            z-index: 190;

            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--text-muted);

            transition: color 0.2s, border-bottom 0.2s;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;

        .filter-tab:hover {
            color: var(--warm-white);
        }

        .filter-tab.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
        }

            position: fixed;
            top: 112px;
            left: 0;
            width: 100%;
            height: calc(100vh - 112px);
            display: grid;
            grid-template-columns: 15% 35% 50%;
            z-index: 10;

            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;

            transform: rotate(180deg);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            color: var(--text-muted);

            width: 1px;
            height: 32px;
            background: var(--gold);
            margin: 24px 0;

            writing-mode: vertical-rl;
            transform: rotate(180deg);

            font-size: 10px;
            color: var(--gold);

            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox */

            display: none; /* Chrome/Safari */
        }

            height: calc(100vh - 112px);

            scroll-snap-stop: always;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.25s ease, filter 0.25s ease;

            transform: scale(1.02);
            filter: brightness(1.08);
        }

        .thumb-card.active {
            border: 2px solid var(--gold);
        }

            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(212, 168, 67, 0.5);
        }

        .card-label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: rgba(250, 247, 240, 0.55);

            backdrop-filter: blur(10px);

            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);

            padding: 56px 64px;

            width: 4px;
        }

            background: rgba(212, 168, 67, 0.3);
            border-radius: 10px;
        }

            line-height: 1.4;

            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 28px;

            font-weight: 300;
            line-height: 1.9;
            color: var(--text-body);

            bottom: 0;
            left: 0;
            width: 100%;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in {
            animation: fadeIn 0.3s ease forwards;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 80px 1fr 1fr;
            }
        }
    </style>
</head>

        const centreReel = document.getElementById('centre-reel');
        const rightContent = document.getElementById('right-content');
        const leftCluster = document.getElementById('left-cluster');
        const leftCounter = document.getElementById('left-counter');

        let activeProjects = [...PROJECTS];
        let currentActiveId = null;

        function renderProjects(filteredList) {
            centreReel.innerHTML = '';
            filteredList.forEach((project, index) => {
                const card = document.createElement('div');
                card.className = 'thumb-card';
                card.id = `card-${project.id}`;
                if (project.image) {
                    card.innerHTML = `
                        <img src="${project.image}" style="width:100%; height:100%; object-fit:cover;" referrerPolicy="no-referrer">
                        <div class="card-label">${String(index + 1).padStart(2, '0')} &middot; ${project.year}</div>
                    `;
                } else {
                    card.style.backgroundColor = project.thumbColor;
                    card.innerHTML = `
                        <div class="card-label">${String(index + 1).padStart(2, '0')} &middot; ${project.year}</div>
                    `;
                }
                
                card.setAttribute('data-id', project.id);
                card.setAttribute('data-index', index + 1);
                
                card.addEventListener('click', () => {
                    window.location.href = project.caseStudyUrl;
                });

                centreReel.appendChild(card);
            });

            // Re-observe new cards
            setupObserver();
        }

        function filterProjects(cluster, tabEl) {
            // Update tabs
            document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
            tabEl.classList.add('active');

            if (cluster === 'All') {
                activeProjects = [...PROJECTS];
            } else {
                activeProjects = PROJECTS.filter(p => p.cluster === cluster);
            }

            renderProjects(activeProjects);
            
            // Snap to top
            centreReel.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateRightColumn(id) {
            if (currentActiveId === id) return;
            currentActiveId = id;

            const project = PROJECTS.find(p => p.id === id);
            if (!project) return;

            // Fade out
            rightContent.classList.remove('visible');

            setTimeout(() => {
                const paragraphsHtml = project.paragraphs.map(p => `<p>${p}</p>`).join('');
                
                rightContent.innerHTML = `
                    <span class="project-tags">${project.tags}</span>
                    <h1 class="project-title">${project.title}</h1>
                    <div class="gold-rule-small"></div>
                    <div class="project-hook">${project.hook}</div>
                    <div class="divider"></div>
                    <div class="project-body">
                        ${paragraphsHtml}
                    </div>
                    <div class="bottom-cta">
                        <a href="${project.caseStudyUrl}" class="view-case-study" target="_blank" rel="noopener noreferrer">View Full Case Study &rarr;</a>
                        <a href="projects.html" class="back-link">&larr; Back to all</a>
                    </div>
                `;

                // Fade in
                rightContent.classList.add('visible');
            }, 150);
        }

        function setupObserver() {
            const options = {
                root: centreReel,
                threshold: 0.6
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute('data-id');
                        const index = entry.target.getAttribute('data-index');
                        const project = PROJECTS.find(p => p.id === id);

                        // Mark active
                        document.querySelectorAll('.thumb-card').forEach(c => c.classList.remove('active'));
                        entry.target.classList.add('active');

                        // Update Left Column
                        leftCluster.style.opacity = '0';
                        leftCounter.style.opacity = '0';
                        
                        setTimeout(() => {
                            leftCluster.textContent = project.cluster;
                            leftCounter.textContent = `${String(index).padStart(2, '0')} / ${String(activeProjects.length).padStart(2, '0')}`;
                            leftCluster.style.opacity = '1';
                            leftCounter.style.opacity = '1';
                        }, 150);

                        // Update Right Column
                        updateRightColumn(id);
                    }
                });
            }, options);

            document.querySelectorAll('.thumb-card').forEach(card => observer.observe(card));
        }

        // Initial Load
        window.addEventListener('load', () => {
            renderProjects(PROJECTS);

            // Handle Hash
            const hash = window.location.hash.replace('#', '');
            if (hash) {
                const targetCard = document.getElementById(`card-${hash}`);
                if (targetCard) {
                    setTimeout(() => {
                        targetCard.scrollIntoView({ behavior: 'smooth' });
                    }, 500);
                }
            }
        });
    </script>
